<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Exercícios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">

    <div class="container-fluid">

        <span class="navbar-brand">
            💪 Área de Exercícios
        </span>

    </div>

</nav>

<div class="container mt-4">

    <!-- Formulário -->

    <div class="card shadow mb-4">

        <div class="card-body">

            <h3 class="mb-4">
                Cadastro de Treino
            </h3>

            <form action="/salvar_exercicio" method="POST">

                <div class="mb-3">

                    <label>
                        Exercício
                    </label>

                    <input type="text"
                           name="nome_exercicio"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label>
                        Repetições
                    </label>

                    <input type="text"
                           name="repeticoes"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label>
                        Observações
                    </label>

                    <textarea name="observacoes"
                              class="form-control"></textarea>

                </div>

                <button class="btn btn-primary">
                    Salvar Exercício
                </button>

            </form>

        </div>

    </div>

    <!-- Lista exercícios -->

    <div class="card shadow">

        <div class="card-body">

            <h3 class="mb-4">
                Treinos Cadastrados
            </h3>

            <table class="table table-bordered">

                <thead>

                    <tr>
                        <th>Exercício</th>
                        <th>Repetições</th>
                        <th>Observações</th>
                    </tr>

                </thead>

                <tbody>

                    {% for exercicio in exercicios %}

                    <tr>

                        <td>{{ exercicio[1] }}</td>
                        <td>{{ exercicio[2] }}</td>
                        <td>{{ exercicio[3] }}</td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
