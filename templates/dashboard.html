<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS do app -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">

    <div class="container-fluid">

        <span class="navbar-brand">
            💖 App Feminino
        </span>

        <a href="/logout" class="btn btn-light btn-sm">
            Sair
        </a>

    </div>

</nav>

<!-- CONTEÚDO -->
<div class="container mt-4">

    <h3 class="mb-4">
        Bem-vinda ao seu App 🌸
    </h3>

    <div class="row g-3">

        <!-- EXERCÍCIOS -->
        <div class="col-12 col-md-4">

            <div class="card shadow text-center p-3">

                <h4>💪 Exercícios</h4>

                <p>Acompanhe seus treinos diários.</p>

                <a href="/exercicios" class="btn btn-primary">
                    Acessar
                </a>

            </div>

        </div>

        <!-- SAÚDE FEMININA -->
        <div class="col-12 col-md-4">

            <div class="card shadow text-center p-3">

                <h4>🌸 Saúde Feminina</h4>

                <p>Ciclo menstrual e bem-estar.</p>

                <a href="/saude" class="btn btn-success">
                    Acessar
                </a>

            </div>

        </div>

        <!-- SEGURANÇA -->
        <div class="col-12 col-md-4">

            <div class="card shadow text-center p-3 border-danger">

                <h4>🛡️ Segurança</h4>

                <p>Área de emergência e proteção.</p>

                <a href="/seguranca" class="btn btn-danger">
                    Emergência
                </a>

            </div>

        </div>

    </div>

</div>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/sw.js')
        .then(function() {
            console.log("Service Worker registrado");
        });
    }
</script>

</body>
</html>
